syntax = "proto3";

package wal;

service WalService {
  rpc Write(WriteRequest) returns (WriteResponse);
  rpc Read(ReadRequest) returns (ReadResponse);
}

message WriteResponse {}

message ReadRequest {
  string partition_name = 1;
}

message WriteRequest {
  string partition_name = 1;
  WalOperation operation = 2;
  bytes key = 3;
  bytes value = 4;
}

message ReadResponse {
  repeated Entry entries = 2;
}

message Entry {
  WalOperation operation = 1;
  bytes key = 2;
  bytes value = 3;
}

enum WalOperation {
  WAL_OPERATION_UNSPECIFIED = 0;
  WAL_OPERATION_PUT = 1;
  WAL_OPERATION_DELETE = 2;
}
